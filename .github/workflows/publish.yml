name: Publish Release

# Take artifacts from a previous "Build and Upload Artifacts" run and publish
# them to a GitHub Release. Decoupled from build so you can pick a known-good
# build, smoke-test it locally, and only then promote it to a release.
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build workflow run ID to pull artifacts from (the numeric id at the end of the run URL)'
        required: true
        type: string
      tag:
        description: 'Release tag (e.g. v1.0.0). Created if it does not exist.'
        required: true
        type: string
      name:
        description: 'Release name (defaults to tag)'
        required: false
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft (do not publish yet)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download chrome build
        uses: actions/download-artifact@v5
        with:
          name: cebian-chrome-build
          path: build/chrome
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download firefox build
        uses: actions/download-artifact@v5
        with:
          name: cebian-firefox-build
          path: build/firefox
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download skills zip
        uses: actions/download-artifact@v5
        with:
          name: cebian-skills-zip
          path: dist/skills
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Package extension zips
        run: |
          set -euo pipefail
          mkdir -p dist
          tag="${{ inputs.tag }}"
          version="${tag#v}"
          (cd build/chrome  && zip -r "$GITHUB_WORKSPACE/dist/cebian-${version}-chrome.zip" .)
          (cd build/firefox && zip -r "$GITHUB_WORKSPACE/dist/cebian-${version}-firefox.zip" .)
          ls -la dist dist/skills

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          tag="${{ inputs.tag }}"
          version="${tag#v}"
          # CHANGELOG headings look like "## 1.3.2 - 2026-06-14" (no leading v, no brackets).
          # Pull the body between this version's heading and the next "## " heading.
          # Match the heading by literal string prefix (no regex) to avoid metachar pitfalls
          # in versions like "1.3.3-rc.1" or "1.3.3+build.1".
          notes=$(awk -v heading="## ${version}" '
            ($0 == heading || index($0, heading " ") == 1) { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -n "$notes" ]; then
            printf '%s\n' "$notes" > release-notes.md
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Extracted release notes for ${version} from CHANGELOG.md:"
            echo "----"
            cat release-notes.md
            echo "----"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No CHANGELOG.md section found for ${version}; will fall back to auto-generated notes."
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.name || inputs.tag }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          body_path: ${{ steps.notes.outputs.found == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
          fail_on_unmatched_files: true
          files: |
            dist/cebian-*-chrome.zip
            dist/cebian-*-firefox.zip
            dist/skills/*.zip
